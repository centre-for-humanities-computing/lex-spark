# nginx/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 300s;

    # Needed for LLM streaming (SSE / chunked responses)
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout      600s;   # Long timeout for generation
    proxy_send_timeout      600s;
    proxy_connect_timeout   30s;

    # Large body size for batch embedding requests
    client_max_body_size    64m;

    # ── Upstream definitions ──────────────────────────────────────

    upstream vllm_gemma_large {
        server vllm-gemma-large:8000;
        keepalive 32;
        keepalive_timeout 300s;    
        keepalive_requests 10000;  

    }

    upstream vllm_gemma_small {
        server vllm-gemma-small:8000;
        keepalive 32;
        keepalive_timeout 300s;   
        keepalive_requests 10000; 
    }

    upstream infinity_embeddings {
        server infinity-embeddings:7997;
        keepalive 32;
        keepalive_timeout 300s;   
        keepalive_requests 10000; 
    }

    gzip off;  # Disable gzip to simplify streaming responses

    # ── Main server block ─────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # ── Health check endpoint (nginx itself) ──
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Large Gemma model ─────────────────────
        # Routes: /gemma-large/* → vllm-gemma-large
        # Example: POST /gemma-large/v1/chat/completions
        location /gemma-large/ {
            rewrite ^/gemma-large/(.*) /$1 break;
            proxy_pass http://vllm_gemma_large;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            # Streaming support
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # ── Small Gemma model ─────────────────────
        # Routes: /gemma-small/* → vllm-gemma-small
        location /gemma-small/ {
            rewrite ^/gemma-small/(.*) /$1 break;
            proxy_pass http://vllm_gemma_small;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # ── Embeddings ────────────────────────────
        # Routes: /embeddings/* → infinity
        # Model selected via "model" field in request body
        location /embeddings/ {
            rewrite ^/embeddings/(.*) /$1 break;
            proxy_pass http://infinity_embeddings;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # ── Catch-all: return useful error ────────
        location / {
            return 404 '{"error":"Unknown route. Use /gemma-large/, /gemma-small/, or /embeddings/"}';
            add_header Content-Type application/json;
        }
    }
}