# nginx/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 300s;

    # Needed for LLM streaming (SSE / chunked responses)
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout      600s;
    proxy_send_timeout      600s;
    proxy_connect_timeout   30s;

    # Large body size for batch embedding requests
    client_max_body_size    64m;

    # ── Upstream definitions ──────────────────────────────────────

    upstream vllm_gemma_large {
        server vllm-gemma-large:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_gemma_small {
        server vllm-gemma-small:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_gemma_e2b {
        server vllm-gemma-extra-small:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    # TEI serves on port 80 inside the container
    upstream tei_e5 {
        server tei-multilingual-e5:80;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream tei_jina {
        server tei-jina-v5-small:80;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    gzip off;  # Disable gzip to simplify streaming responses

    # ── Main server block ─────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # ── Health check endpoint (nginx itself) ──
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Large Gemma model ─────────────────────
        location /gemma-large/ {
            rewrite ^/gemma-large/(.*) /$1 break;
            proxy_pass http://vllm_gemma_large;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # ── Small Gemma model ─────────────────────
        location /gemma-small/ {
            rewrite ^/gemma-small/(.*) /$1 break;
            proxy_pass http://vllm_gemma_small;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # ── Extra Small Gemma model ───────────────
        location /gemma-e2b/ {
            rewrite ^/gemma-e2b/(.*) /$1 break;
            proxy_pass http://vllm_gemma_e2b;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # ── Embeddings: multilingual-e5-large ─────
        # Routes: /embeddings/e5/* → tei-multilingual-e5
        # Example: POST /embeddings/e5/embed
        location /embeddings/e5/ {
            rewrite ^/embeddings/e5/(.*) /$1 break;
            proxy_pass http://tei_embed_e5;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # ── Embeddings: jina-v5-small ─────────────
        # Routes: /embeddings/jina/* → tei-jina-v5-small
        # Example: POST /embeddings/jina/embed
        location /embeddings/jina/ {
            rewrite ^/embeddings/jina/(.*) /$1 break;
            proxy_pass http://tei_embed_jina;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # ── Catch-all: return useful error ────────
        location / {
            return 404 '{"error":"Unknown route. Use /gemma-large/, /gemma-small/, /gemma-e2b/, /embeddings/e5/, or /embeddings/jina/"}';
            add_header Content-Type application/json;
        }
    }
}