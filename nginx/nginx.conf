worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 300s;

    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout      600s;
    proxy_send_timeout      600s;
    proxy_connect_timeout   30s;

    client_max_body_size    64m;

    # ── Upstream definitions ──────────────────────────────────────

    upstream vllm_gemma_large {
        server vllm-gemma-large:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_gemma_e2b {
        server vllm-gemma-extra-small:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_embed_e5 {
        server vllm-embed-e5:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_embed_jina {
        server vllm-embed-jina:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    gzip off;

    # ── Main server block ─────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # ── Nginx health check ────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Large Gemma model ─────────────────────
        # POST /gemma-large/v1/chat/completions
        location /gemma-large/ {
            rewrite ^/gemma-large/(.*) /$1 break;
            proxy_pass http://vllm_gemma_large;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # ── Extra small Gemma model ───────────────
        # POST /gemma-e2b/v1/chat/completions
        location /gemma-e2b/ {
            rewrite ^/gemma-e2b/(.*) /$1 break;
            proxy_pass http://vllm_gemma_e2b;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # ── Embeddings: multilingual-e5-large ─────
        # POST /embeddings/e5/v1/embeddings
        location /embeddings/e5/ {
            rewrite ^/embeddings/e5/(.*) /$1 break;
            proxy_pass http://vllm_embed_e5;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # ── Embeddings: jina-v5-small ─────────────
        # POST /embeddings/jina/v1/embeddings
        location /embeddings/jina/ {
            rewrite ^/embeddings/jina/(.*) /$1 break;
            proxy_pass http://vllm_embed_jina;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # ── Catch-all ─────────────────────────────
        location / {
            return 404 '{"error":"Unknown route. Use /gemma-large/, /gemma-e2b/, /embeddings/e5/, or /embeddings/jina/"}';
            add_header Content-Type application/json;
        }
    }
}