worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Extended log format: include the routed model name and chosen upstream
    # so LiteLLM integration issues are debuggable from the access log alone.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time '
                      'model="$req_model" upstream="$target"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 300s;

    # NOTE: proxy_request_buffering MUST be 'on' for the public server because
    # we inspect $request_body via `map` to route by model name. We override
    # it per-location below where streaming matters (it only affects upload,
    # not SSE responses).
    proxy_buffering         off;
    proxy_read_timeout      600s;
    proxy_send_timeout      600s;
    proxy_connect_timeout   30s;

    client_max_body_size    64m;
    # Must be large enough to hold a full chat request so $request_body is
    # populated (otherwise nginx spills to a temp file and $request_body == "").
    client_body_buffer_size 1m;

    # ── Upstream definitions ──────────────────────────────────────

    upstream vllm_gemma_large {
        server vllm-gemma-large:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_gemma_e2b {
        server vllm-gemma-extra-small:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_embed_e5 {
        server vllm-embed-e5:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_embed_jina {
        server vllm-embed-jina:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    gzip off;

    # ── Model-name routing ────────────────────────────────────────
    # Extract the "model" field from the JSON body. Forgiving regex that
    # tolerates whitespace and ignores trailing characters in the value.
    map $request_body $req_model {
        default                                              "";
        "~*\"model\"\s*:\s*\"(?<m>[^\"]+)\""                 $m;
    }

    # Map served model name -> upstream. Add new models here only.
    # The "" default routes unknown/missing models to a 400-returning location
    # so misconfigured clients fail loudly instead of silently hitting the wrong
    # backend.
    map $req_model $target {
        default                       "";
        "gemma-4-26B-A4B-it"          vllm_gemma_large;
        "gemma-4-E2B-it"              vllm_gemma_e2b;
        "multilingual-e5-large"       vllm_embed_e5;
        "jina-v5-small"               vllm_embed_jina;
    }

    # ── Public server (LiteLLM-facing) ────────────────────────────

    server {
        listen 80;
        server_name _;

        # ── Nginx health check ────────────────────
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ── Aggregated /v1/models for LiteLLM introspection ───────
        # Returned statically; cheaper than fanning out to all backends and
        # avoids dependency on every container being up to list models.
        location = /v1/models {
            access_log off;
            default_type application/json;
            return 200 '{"object":"list","data":[
                {"id":"gemma-4-26B-A4B-it","object":"model","owned_by":"vllm"},
                {"id":"gemma-4-E2B-it","object":"model","owned_by":"vllm"},
                {"id":"multilingual-e5-large","object":"model","owned_by":"vllm"},
                {"id":"jina-v5-small","object":"model","owned_by":"vllm"}
            ]}';
        }

        # ── OpenAI-compatible routes (chat/embeddings/completions/rerank) ──
        # Single location handles every /v1/* endpoint by inspecting the JSON
        # body's "model" field and forwarding to the matching upstream.
        location /v1/ {
            # If `model` was missing or unknown, return a clear 400 instead of
            # silently routing to a default. This catches LiteLLM misconfig
            # (wrong served-model-name) immediately.
            if ($target = "") {
                add_header Content-Type application/json always;
                return 400 '{"error":{"message":"Unknown or missing model. Supported: gemma-4-26B-A4B-it, gemma-4-E2B-it, multilingual-e5-large, jina-v5-small","type":"invalid_request_error"}}';
            }

            proxy_pass http://$target;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            # Request body must be fully buffered so `map` can read it.
            # Response is streamed (proxy_buffering off above) so SSE works.
            proxy_request_buffering on;
            chunked_transfer_encoding on;
        }

        # ── Legacy path-prefix routes (kept for backward compatibility) ──
        # Mark these deprecated; remove once all clients use /v1/* with model
        # field. Useful during the migration window.
        location /gemma-large/ {
            rewrite ^/gemma-large/(.*) /$1 break;
            proxy_pass http://vllm_gemma_large;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_request_buffering off;     # streaming uploads OK here
            chunked_transfer_encoding on;
            add_header X-Deprecated-Route "Use /v1/* with model field" always;
        }

        location /gemma-e2b/ {
            rewrite ^/gemma-e2b/(.*) /$1 break;
            proxy_pass http://vllm_gemma_e2b;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
            add_header X-Deprecated-Route "Use /v1/* with model field" always;
        }

        location /embeddings/e5/ {
            rewrite ^/embeddings/e5/(.*) /$1 break;
            proxy_pass http://vllm_embed_e5;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            add_header X-Deprecated-Route "Use /v1/embeddings with model field" always;
        }

        location /embeddings/jina/ {
            rewrite ^/embeddings/jina/(.*) /$1 break;
            proxy_pass http://vllm_embed_jina;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            add_header X-Deprecated-Route "Use /v1/embeddings with model field" always;
        }

        # ── Metrics proxy (mirrors port 9100; reachable via port 80) ──
        # These let the VPS scrape vLLM metrics without needing port 9100
        # opened. Prometheus inside Docker still uses port 9100 internally.
        location = /up {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /metrics/gemma-large {
            access_log off;
            proxy_pass http://vllm_gemma_large/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location = /metrics/gemma-e2b {
            access_log off;
            proxy_pass http://vllm_gemma_e2b/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location = /metrics/embed-e5 {
            access_log off;
            proxy_pass http://vllm_embed_e5/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location = /metrics/embed-jina {
            access_log off;
            proxy_pass http://vllm_embed_jina/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        # ── Catch-all ─────────────────────────────
        location / {
            default_type application/json;
            return 404 '{"error":"Unknown route. Use /v1/chat/completions, /v1/embeddings, /v1/completions, or /v1/models with a valid model field."}';
        }
        
        location /metrics/ {
            access_log off;
            default_type text/plain;
            return 200 "vLLM metrics endpoints:\n  /metrics/gemma-large\n  /metrics/gemma-e2b\n  /metrics/embed-e5\n  /metrics/embed-jina\n  /up (liveness)\n";
        }
    }

    # ─────────────────────────────────────────────────────────────
    # INTERNAL: metrics & ops (unchanged)
    # ─────────────────────────────────────────────────────────────
    server {
        listen 9100;
        server_name _;

        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny  all;

        location / {
            access_log off;
            default_type text/plain;
            return 200 "vLLM metrics endpoints:\n  /metrics/gemma-large\n  /metrics/gemma-e2b\n  /metrics/embed-e5\n  /metrics/embed-jina\n  /up (liveness)\n";
        }

        location /up {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /metrics/gemma-large {
            access_log off;
            proxy_pass http://vllm_gemma_large/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location /metrics/gemma-e2b {
            access_log off;
            proxy_pass http://vllm_gemma_e2b/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location /metrics/embed-e5 {
            access_log off;
            proxy_pass http://vllm_embed_e5/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location /metrics/embed-jina {
            access_log off;
            proxy_pass http://vllm_embed_jina/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }
    }
}