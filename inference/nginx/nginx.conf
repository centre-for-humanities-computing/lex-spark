worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Extended log format: include the routed model name and chosen upstream
    # so LiteLLM integration issues are debuggable from the access log alone.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 300s;

    # NOTE: proxy_buffering is off globally for SSE streaming.
    # proxy_request_buffering is set per-location as needed.
    proxy_buffering         off;
    proxy_read_timeout      600s;
    proxy_send_timeout      600s;
    proxy_connect_timeout   30s;

    client_max_body_size    64m;

    # ── Upstream definitions ──────────────────────────────────────

    upstream vllm_gemma_large {
        server vllm-gemma-large:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_gemma_e2b {
        server vllm-gemma-extra-small:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_embed_e5 {
        server vllm-embed-e5:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    upstream vllm_embed_jina {
        server vllm-embed-jina:8000;
        keepalive 32;
        keepalive_timeout 300s;
        keepalive_requests 10000;
    }

    gzip off;

    # ── Public server (LiteLLM-facing) ────────────────────────────

    server {
        listen 80;
        server_name _;

        # ── Nginx health check ────────────────────
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ── Aggregated /v1/models for LiteLLM introspection ───────
        # Returned statically; cheaper than fanning out to all backends and
        # avoids dependency on every container being up to list models.
        location = /v1/models {
            access_log off;
            default_type application/json;
            return 200 '{"object":"list","data":[
                {"id":"gemma-4-26B-A4B-it","object":"model","owned_by":"vllm"},
                {"id":"gemma-4-E2B-it","object":"model","owned_by":"vllm"},
                {"id":"multilingual-e5-large","object":"model","owned_by":"vllm"},
                {"id":"jina-v5-small","object":"model","owned_by":"vllm"}
            ]}';
        }

        # ── Model-name routing (path-prefix based) ───────────────
        # The URL path prefix IS the model name. nginx rewrites
        #   /{model}/v1/chat/completions → /v1/chat/completions
        # and forwards to the correct upstream. No aliases, no maps.
        location /gemma-4-26B-A4B-it/ {
            rewrite ^/gemma-4-26B-A4B-it/(.*) /$1 break;
            proxy_pass http://vllm_gemma_large;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_request_buffering off;     # streaming uploads
            chunked_transfer_encoding on;
        }

        location /gemma-4-E2B-it/ {
            rewrite ^/gemma-4-E2B-it/(.*) /$1 break;
            proxy_pass http://vllm_gemma_e2b;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_request_buffering off;
            chunked_transfer_encoding on;
        }

        location /multilingual-e5-large/ {
            rewrite ^/multilingual-e5-large/(.*) /$1 break;
            proxy_pass http://vllm_embed_e5;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        location /jina-v5-small/ {
            rewrite ^/jina-v5-small/(.*) /$1 break;
            proxy_pass http://vllm_embed_jina;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # ── Metrics proxy (mirrors port 9100; reachable via port 80) ──
        # These let the VPS scrape vLLM metrics without needing port 9100
        # opened. Prometheus inside Docker still uses port 9100 internally.
        location = /up {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /metrics/gemma-4-26B-A4B-it {
            access_log off;
            proxy_pass http://vllm_gemma_large/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location = /metrics/gemma-4-E2B-it {
            access_log off;
            proxy_pass http://vllm_gemma_e2b/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location = /metrics/multilingual-e5-large {
            access_log off;
            proxy_pass http://vllm_embed_e5/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location = /metrics/jina-v5-small {
            access_log off;
            proxy_pass http://vllm_embed_jina/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        # ── Catch-all ─────────────────────────────
        location / {
            default_type application/json;
            return 404 '{"error":"Unknown route. Use /{model}/v1/chat/completions, /{model}/v1/embeddings, /{model}/v1/completions with a valid model name."}';
        }
        
        location /metrics/ {
            access_log off;
            default_type text/plain;
            return 200 "vLLM metrics endpoints:\n  /metrics/gemma-4-26B-A4B-it\n  /metrics/gemma-4-E2B-it\n  /metrics/multilingual-e5-large\n  /metrics/jina-v5-small\n  /up (liveness)\n";
        }
    }

    # ─────────────────────────────────────────────────────────────
    # INTERNAL: metrics & ops (unchanged)
    # ─────────────────────────────────────────────────────────────
    server {
        listen 9100;
        server_name _;

        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny  all;

        location / {
            access_log off;
            default_type text/plain;
            return 200 "vLLM metrics endpoints:\n  /metrics/gemma-4-26B-A4B-it\n  /metrics/gemma-4-E2B-it\n  /metrics/multilingual-e5-large\n  /metrics/jina-v5-small\n  /up (liveness)\n";
        }

        location /up {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /metrics/gemma-4-26B-A4B-it {
            access_log off;
            proxy_pass http://vllm_gemma_large/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location /metrics/gemma-4-E2B-it {
            access_log off;
            proxy_pass http://vllm_gemma_e2b/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location /metrics/multilingual-e5-large {
            access_log off;
            proxy_pass http://vllm_embed_e5/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }

        location /metrics/jina-v5-small {
            access_log off;
            proxy_pass http://vllm_embed_jina/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            proxy_send_timeout    5s;
        }
    }
}