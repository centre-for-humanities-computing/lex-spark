# Config 2 — MTP speculative decoding for both models.
# 26B target = NVIDIA NVFP4 (works natively with MTP, NO gemma4_patched.py).
# 26B assistant = google/gemma-4-26B-A4B-it-assistant (MUST be 26B-A4B; 31B fails dim-mismatch).
# E2B = QAT compressed-tensors + matching QAT assistant.
# Image = nightly-aarch64 (required for NVFP4 + MTP on Spark per note.com/gb10_tsurumitsu).
# NOTE: MTP boosts decode (~55-61 vs ~32 tok/s) but HURTS long-prefill/short-output.
# Launch: docker compose -f docker-compose.bench2-mtp.yml up -d
name: dgx-inference

x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]

x-vllm-nightly: &vllm-nightly
  image: vllm/vllm-openai:nightly-aarch64
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

x-vllm-standard: &vllm-standard
  image: nvcr.io/nvidia/vllm:25.12-py3
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

services:

  # ── 26B A4B NVFP4 (NVIDIA) + MTP ──────────────────────────────────
  vllm-gemma-large:
    <<: *vllm-nightly
    container_name: vllm-gemma-large
    ports:
      - "8001:8000"
    command: >
      ${C2_GEMMA_26B}
      --served-model-name gemma-4-26B-A4B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 32768
      --gpu-memory-utilization 0.50
      --dtype auto
      --enable-prefix-caching
      --max-num-batched-tokens 8192
      --trust-remote-code
      --max-num-seqs 4
      --speculative-config '{"model":"${C2_GEMMA_26B_ASSISTANT}","num_speculative_tokens":3}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s

  # ── E2B QAT compressed-tensors + MTP ──────────────────────────────
  vllm-gemma-extra-small:
    <<: *vllm-nightly
    container_name: vllm-gemma-extra-small
    ports:
      - "8004:8000"
    command: >
      ${C2_GEMMA_E2B}
      --served-model-name gemma-4-E2B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 32768
      --gpu-memory-utilization 0.20
      --dtype auto
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --max-num-batched-tokens 8192
      --trust-remote-code
      --max-num-seqs 64
      --speculative-config '{"model":"${C2_GEMMA_E2B_ASSISTANT}","num_speculative_tokens":3}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 180s

  vllm-embed-e5:
    <<: *vllm-standard
    container_name: vllm-embed-e5
    ports:
      - "8003:8000"
    command: >
      vllm serve ${EMBED_MODEL_1}
      --served-model-name multilingual-e5-large
      --host 0.0.0.0
      --port 8000
      --task embedding
      --dtype bfloat16
      --gpu-memory-utilization 0.08
      --trust-remote-code
      --max-model-len 512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  vllm-embed-jina:
    <<: *vllm-standard
    container_name: vllm-embed-jina
    ports:
      - "8005:8000"
    command: >
      vllm serve ${EMBED_MODEL_2}
      --served-model-name jina-v5-small
      --host 0.0.0.0
      --port 8000
      --task embedding
      --dtype bfloat16
      --gpu-memory-utilization 0.12
      --trust-remote-code
      --max-model-len 32768
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/docker-entrypoint.sh"]
    depends_on:
      vllm-gemma-large:
        condition: service_healthy
      vllm-gemma-extra-small:
        condition: service_healthy
      vllm-embed-e5:
        condition: service_healthy
      vllm-embed-jina:
        condition: service_healthy