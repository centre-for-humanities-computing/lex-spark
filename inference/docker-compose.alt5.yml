# Config 5 — Gemma 4 26B FP8 Dynamic + MTP (RedHatAI quant, PR #41745 patched gemma4_mtp.py).
# Based on the blog recipe: 108 tok/s single-stream, 674 tok/s aggregate @ concurrency=8.
# Uses the gemma4-0505-arm64-cu130 preview image + bind-mounted gemma4_mtp.py patch.
# Once PR #41745 merges into an official image, the bind-mount is no longer needed.
#
# E2B and embedding models are carried over from the main docker-compose.yml.
#
# Launch: docker compose -f docker-compose.alt5.yml up -d
name: dgx-inference

x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]

# ── Gemma 4 0505 preview image (needed for FP8 + MTP on this specific build) ──
x-vllm-gemma4-0505: &vllm-gemma4-0505
  image: vllm/vllm-openai:gemma4-0505-arm64-cu130
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

x-vllm-nightly: &vllm-nightly
  image: vllm/vllm-openai:nightly-aarch64
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

x-vllm-standard: &vllm-standard
  image: nvcr.io/nvidia/vllm:25.12-py3
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

services:

  # ── Gemma 4 26B A4B FP8 Dynamic + MTP ─────────────────────────────
  # GPU memory: 0.60 (reduced from blog's 0.85 to leave room for E2B + embeddings).
  # If running this model alone, bump to 0.85 for max throughput.
  vllm-gemma-large:
    <<: *vllm-gemma4-0505
    container_name: vllm-gemma-large
    volumes:
      - ${MODEL_CACHE_PATH}:/model-cache
      # gemma4_mtp.py patch from vLLM PR #41745 (SHA d8b3826).
      # Download once:
      #   wget https://raw.githubusercontent.com/vllm-project/vllm/d8b3826648da6b407f8c55457a2103be9aeb5d83/vllm/model_executor/models/gemma4_mtp.py \
      #     -O ./gemma4_mtp.py
      # Remove this mount after PR #41745 merges into an official image.
      - ./gemma4_mtp.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/gemma4_mtp.py:ro
    ports:
      - "8001:8000"
    command: >
      ${C5_GEMMA_26B}
      --served-model-name gemma-4-26B-A4B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 65536
      --gpu-memory-utilization 0.60
      --kv-cache-dtype fp8
      --dtype auto
      --enable-prefix-caching
      --enable-chunked-prefill
      --max-num-batched-tokens 8192
      --trust-remote-code
      --max-num-seqs 10
      --speculative-config '{"method":"mtp","model":"${C5_GEMMA_26B_ASSISTANT}","num_speculative_tokens":4}'
      --limit-mm-per-prompt '{"image":0,"audio":0,"video":0}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s

  # ── E2B QAT compressed-tensors + MTP (from main docker-compose.yml) ─
  # GPU memory: 0.15 (reduced from 0.20 to make room for the 26B FP8 model).
  vllm-gemma-extra-small:
    <<: *vllm-nightly
    container_name: vllm-gemma-extra-small
    ports:
      - "8004:8000"
    command: >
      ${C2_GEMMA_E2B}
      --served-model-name gemma-4-E2B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 16384
      --gpu-memory-utilization 0.15
      --dtype auto
      --enable-prefix-caching
      --max-num-batched-tokens 8192
      --trust-remote-code
      --max-num-seqs 64
      --speculative-config '{"model":"${C2_GEMMA_E2B_ASSISTANT}","num_speculative_tokens":3}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 180s

  # ── Embedding: multilingual-e5-large ───────────────────────────────
  # GPU memory: 0.06 (reduced from 0.08).
  vllm-embed-e5:
    <<: *vllm-standard
    container_name: vllm-embed-e5
    ports:
      - "8003:8000"
    command: >
      vllm serve ${EMBED_MODEL_1}
      --served-model-name multilingual-e5-large
      --host 0.0.0.0
      --port 8000
      --task embedding
      --dtype bfloat16
      --gpu-memory-utilization 0.05
      --trust-remote-code
      --max-model-len 512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Embedding: jina-v5-small ──────────────────────────────────────
  # GPU memory: 0.08 (reduced from 0.12).
  vllm-embed-jina:
    <<: *vllm-standard
    container_name: vllm-embed-jina
    ports:
      - "8005:8000"
    command: >
      vllm serve ${EMBED_MODEL_2}
      --served-model-name jina-v5-small
      --host 0.0.0.0
      --port 8000
      --task embedding
      --dtype bfloat16
      --gpu-memory-utilization 0.10
      --trust-remote-code
      --max-model-len 32768
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─────────────────────────────────────────────
  # NGINX Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "10.57.5.14:9100:9100"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm-gemma-large:
        condition: service_healthy
      vllm-gemma-extra-small:
        condition: service_healthy
      vllm-embed-e5:
        condition: service_healthy
      vllm-embed-jina:
        condition: service_healthy