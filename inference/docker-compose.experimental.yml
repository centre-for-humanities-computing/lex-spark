# docker-compose.experimental.yml
# ── Experimental inference stack (drop-in replacement for docker-compose.yml) ──
#
# Changes from the default stack:
#   1. E2B → NVFP4-quantized Gemma 4 E2B with MTP speculative decoding
#   2. 26B → DiffusionGemma 26B-A4B (block-diffusion, NVFP4-quantized)
#   3. Embeddings (e5, jina) — unchanged
#   4. Served-model-names identical — LiteLLM and monitoring need no changes
#
# ⚠️ GPU MEMORY: This stack's defaults sum to >100% on a single GPU.
#    DiffusionGemma 0.85 + E2B 0.10 + e5 0.08 + jina 0.08 = 1.11.
#    Tune --gpu-memory-utilization values for your Spark before deploying.
#    Suggestion: lower DiffusionGemma to ~0.70 (0.70+0.10+0.08+0.08=0.96).
#
# Launch: docker compose -f docker-compose.experimental.yml up -d
# (Stop the default stack first: docker compose -f docker-compose.yml down)

name: dgx-inference

# ── Shared GPU resource definition ───────────────────────────────────────────
x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]

# ── Gemma 4 vLLM base (for quantized E2B + MTP) ──────────────────────────────
x-vllm-gemma4: &vllm-gemma4
  image: vllm/vllm-openai:gemma4-0505-cu130
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

# ── Diffusion vLLM base (for DiffusionGemma) ─────────────────────────────────
# Uses vllm/vllm-openai:gemma per the DiffusionGemma recipe.
x-vllm-diffusion: &vllm-diffusion
  image: vllm/vllm-openai:gemma
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

# ── Standard NVIDIA vLLM base (for embeddings) ────────────────────────────────
x-vllm-standard: &vllm-standard
  image: nvcr.io/nvidia/vllm:25.12-py3
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

services:

  # ── DiffusionGemma 26B-A4B (block-diffusion, NVFP4) ──────────────────────
  # Replaces vllm-gemma-large from the default stack.
  # Block-diffusion generates 256-token blocks via iterative denoising.
  # Higher time-to-first-token, significantly higher generation throughput.
  vllm-gemma-large:
    <<: *vllm-diffusion
    container_name: vllm-gemma-large
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_HOME=/model-cache
      # NVFP4 quantization uses Marlin kernel for non-MoE layers on SM 12.1.
      - VLLM_NVFP4_GEMM_BACKEND=marlin
    ports:
      - "8001:8000"
    command: >
      ${GEMMA_DIFFUSION_MODEL}
      --served-model-name gemma-4-26B-A4B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 131072
      --max-num-seqs 4
      --gpu-memory-utilization 0.55
      --generation-config vllm
      --quantization modelopt
      --dtype auto
      --moe-backend marlin
      --trust-remote-code
      --hf-overrides '{"diffusion_sampler":"entropy_bound","diffusion_entropy_bound":0.1}'
      --diffusion-config '{"canvas_length":256}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s

  # ── Gemma 4 E2B (NVFP4-quantized + MTP speculative decoding) ────────────
  # Replaces vllm-gemma-extra-small from the default stack.
  # MTP uses gg-hf-am/gemma-4-E2B-it-assistant for speculative decoding.
  vllm-gemma-extra-small:
    <<: *vllm-gemma4
    container_name: vllm-gemma-extra-small
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_HOME=/model-cache
      # NVFP4 quantization requires Marlin kernel on SM 12.1.
      - VLLM_NVFP4_GEMM_BACKEND=marlin
    ports:
      - "8004:8000"
    command: >
      ${GEMMA_E2B_QUANT_MODEL}
      --served-model-name gemma-4-E2B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 32768
      --gpu-memory-utilization 0.10
      --dtype auto
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --max-num-batched-tokens 8192
      --trust-remote-code
      --max-num-seqs 64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 120s

  # ── Embedding: multilingual-e5-large (unchanged) ────────────────────────
  vllm-embed-e5:
    <<: *vllm-standard
    container_name: vllm-embed-e5
    ports:
      - "8003:8000"
    command: >
      vllm serve ${EMBED_MODEL_1}
      --served-model-name multilingual-e5-large
      --host 0.0.0.0
      --port 8000
      --task embedding
      --dtype bfloat16
      --gpu-memory-utilization 0.08
      --trust-remote-code
      --max-model-len 512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Embedding: jina-v5-small (unchanged) ────────────────────────────────
  vllm-embed-jina:
    <<: *vllm-standard
    container_name: vllm-embed-jina
    ports:
      - "8005:8000"
    command: >
      vllm serve ${EMBED_MODEL_2}
      --served-model-name jina-v5-small
      --host 0.0.0.0
      --port 8000
      --task embedding
      --dtype bfloat16
      --gpu-memory-utilization 0.12
      --trust-remote-code
      --max-model-len 32768
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─────────────────────────────────────────────
  # NGINX Reverse Proxy (mounts experimental conf)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "10.57.5.14:9100:9100"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm-gemma-large:
        condition: service_healthy
      vllm-gemma-extra-small:
        condition: service_healthy
      vllm-embed-e5:
        condition: service_healthy
      vllm-embed-jina:
        condition: service_healthy
