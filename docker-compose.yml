# docker-compose.yml
name: dgx-inference

# ── Shared GPU resource definition ───────────────────────────────────────────
x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]

# ── Shared Gemma 4 vLLM base (uses the special gemma4 image) ─────────────────
x-vllm-gemma4: &vllm-gemma4
  # IMPORTANT: Standard nvcr.io/nvidia/vllm image does NOT support Gemma 4.
  # This custom build is required per the DGX Spark vLLM playbook.
  image: vllm/vllm-openai:gemma4-cu130
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

# ── Shared TEI base ───────────────────────────────────────────────────────────
x-tei: &tei
  # sm_121 = Blackwell/GH200 compute capability (DGX Spark Grace-Hopper).
  # This image was added in TEI 1.9 specifically for DGX Spark support.
  image: ghcr.io/huggingface/text-embeddings-inference:121-1.9
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/data
  volumes:
    - ${MODEL_CACHE_PATH}:/data
  <<: *gpu-resources

services:

  # ── Gemma 4 26B A4B (MoE) — large/capable model ──────────────────────────
  vllm-gemma-large:
    <<: *vllm-gemma4
    container_name: vllm-gemma-large
    ports:
      - "8001:8000"
    command: >
      ${GEMMA_LARGE_MODEL}
      --served-model-name gemma-4-26B-A4B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 131072
      --gpu-memory-utilization 0.50
      --attention-backend flashinfer
      --dtype bfloat16
      --enable-prefix-caching
      --enable-chunked-prefill
      --max-num-batched-tokens 8192
      --trust-remote-code
      --max-num-seqs 32
      --kv-cache-dtype fp8_e5m2
      --speculative-config '{
        "model": "RedHatAI/gemma-4-26B-A4B-it-speculator.eagle3",
        "num_speculative_tokens": 3,
        "method": "eagle3"
      }'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 180s

  # ── Gemma 4 E4B (Dense) — fast/lightweight model ──────────────────────────
  vllm-gemma-small:
    <<: *vllm-gemma4
    container_name: vllm-gemma-small
    ports:
      - "8002:8000"
    command: >
      ${GEMMA_SMALL_MODEL}
      --served-model-name gemma-4-E4B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 65536
      --gpu-memory-utilization 0.15
      --attention-backend flashinfer
      --dtype bfloat16
      --enable-prefix-caching
      --kv-cache-dtype fp8_e5m2
      --enable-chunked-prefill
      --max-num-batched-tokens 4096
      --trust-remote-code
      --max-num-seqs 64
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 120s

  # ── Gemma 4 E2B (Dense) — extra small/fast model ──────────────────────────
  vllm-gemma-extra-small:
    <<: *vllm-gemma4
    container_name: vllm-gemma-extra-small
    ports:
      - "8004:8000"
    command: >
      ${GEMMA_EXTRA_SMALL_MODEL}
      --served-model-name gemma-4-E2B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 32768
      --gpu-memory-utilization 0.10
      --attention-backend flashinfer
      --dtype bfloat16
      --enable-prefix-caching
      --kv-cache-dtype fp8_e5m2
      --enable-chunked-prefill
      --max-num-batched-tokens 2048
      --trust-remote-code
      --max-num-seqs 128
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 90s

  # ── TEI: multilingual-e5-large ────────────────────────────────────────────
  tei-embed-e5:
    <<: *tei
    container_name: tei-embed-e5
    ports:
      - "8003:80"
    command: >
      --model-id ${EMBED_MODEL_1}
      --served-model-name multilingual-e5-large
      --dtype float16
      --port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── TEI: jina-embeddings-v5-text-small (retrieval variant) ───────────────
  tei-embed-jina:
    <<: *tei
    container_name: tei-embed-jina
    ports:
      - "8005:80"
    command: >
      --model-id ${EMBED_MODEL_2}
      --served-model-name jina-v5-small
      --dtype float16
      --pooling last-token
      --port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─────────────────────────────────────────────
  # NGINX Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm-gemma-large:
        condition: service_healthy
      vllm-gemma-small:
        condition: service_healthy
      vllm-gemma-extra-small:
        condition: service_healthy
      tei-embed-e5:
        condition: service_healthy
      tei-embed-jina:
        condition: service_healthy