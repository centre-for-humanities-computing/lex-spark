# docker-compose.yml
name: dgx-inference

# ── Shared GPU resource definition ───────────────────────────────────────────
x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [gpu]

# ── Gemma 4 vLLM base ─────────────────────────────────────────────────────────
# The gemma4-cu130 custom image is required for the Gemma 4 model family.
# It does NOT support general embedding models.
x-vllm-gemma4: &vllm-gemma4
  image: vllm/vllm-openai:gemma4-cu130
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

# ── Standard NVIDIA vLLM base ─────────────────────────────────────────────────
# Use the standard NGC image for non-Gemma models (embedding models, etc.)
# Per the DGX Spark vLLM playbook: nvcr.io/nvidia/vllm:<latest_version>
x-vllm-standard: &vllm-standard
  image: nvcr.io/nvidia/vllm:26.02-py3
  restart: unless-stopped
  environment:
    - HF_TOKEN=${HF_TOKEN}
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    - HF_HOME=/model-cache
  volumes:
    - ${MODEL_CACHE_PATH}:/model-cache
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  <<: *gpu-resources

services:

  # ── Gemma 4 26B A4B (MoE) — large/capable model ──────────────────────────
  vllm-gemma-large:
    <<: *vllm-gemma4
    container_name: vllm-gemma-large
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_HOME=/model-cache
      # Required for NVFP4 quantization: use Marlin kernel for non-MoE layers.
      # Without this, GEMM operations fall back to an incorrect path on SM 12.1.
      - VLLM_NVFP4_GEMM_BACKEND=marlin
    volumes:
      - ${MODEL_CACHE_PATH}:/model-cache
      # The included gemma4_patched.py fixes vLLM's expert_params_mapping for
      # NVFP4 scale keys. Download it from the model repo and place it alongside
      # your docker-compose.yml. Without this patch, MoE scale keys are silently
      # mis-mapped and outputs will be incorrect.
      - ./gemma4_patched.py:/usr/local/lib/python3.12/dist-packages/gemma4_patched.py

    ports:
      - "8001:8000"
    command: >
      ${GEMMA_LARGE_MODEL}
      --served-model-name gemma-4-26B-A4B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 131072
      --gpu-memory-utilization 0.50
      --attention-backend flashinfer
      --quantization modelopt
      --dtype auto
      --enable-prefix-caching
      --enable-chunked-prefill
      --max-num-batched-tokens 8192
      --trust-remote-code
      --max-num-seqs 32
      --moe-backend marlin
      --kv-cache-dtype fp8_e5m2
      --speculative-config '{
        "model": "RedHatAI/gemma-4-26B-A4B-it-speculator.eagle3",
        "num_speculative_tokens": 3,
        "method": "eagle3"
      }'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 180s

  # ── Gemma 4 E2B (Dense) — fast/lightweight model ──────────────────────────
  vllm-gemma-extra-small:
    <<: *vllm-gemma4
    container_name: vllm-gemma-extra-small
    ports:
      - "8004:8000"
    command: >
      ${GEMMA_EXTRA_SMALL_MODEL}
      --served-model-name gemma-4-E2B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --max-model-len 32768
      --gpu-memory-utilization 0.10
      --attention-backend flashinfer
      --dtype auto
      --enable-prefix-caching
      --kv-cache-dtype fp8_e5m2
      --enable-chunked-prefill
      --max-num-batched-tokens 2048
      --trust-remote-code
      --max-num-seqs 128
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 90s

  # ── multilingual-e5-large embeddings ─────────────────────────────────────
  vllm-embed-e5:
    <<: *vllm-standard
    container_name: vllm-embed-e5
    ports:
      - "8003:8000"
    command: >
      vllm serve ${EMBED_MODEL_1}
      --served-model-name multilingual-e5-large
      --host 0.0.0.0
      --port 8000
      --task embed
      --dtype auto
      --gpu-memory-utilization 0.08
      --trust-remote-code
      --max-model-len 512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── jina-embeddings-v5-small embeddings ───────────────────────────────────
  vllm-embed-jina:
    <<: *vllm-standard
    container_name: vllm-embed-jina
    ports:
      - "8005:8000"
    command: >
      vllm serve ${EMBED_MODEL_2}
      --served-model-name jina-v5-small
      --host 0.0.0.0
      --port 8000
      --task embed
      --dtype auto
      --gpu-memory-utilization 0.08
      --trust-remote-code
      --max-model-len 32768
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─────────────────────────────────────────────
  # NGINX Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm-gemma-large:
        condition: service_healthy
      vllm-gemma-extra-small:
        condition: service_healthy
      vllm-embed-e5:
        condition: service_healthy
      vllm-embed-jina:
        condition: service_healthy