global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    host: dgx-spark

scrape_configs:
  # ── vLLM backends via nginx metrics listener ────────────────────
  # We scrape through nginx on port 9100 (your internal listener).
  # Alternatively, scrape each vllm container directly by name.
  - job_name: vllm-gemma-large
    metrics_path: /metrics/gemma-large
    scrape_interval: 5s   # faster for the model we actively route on
    static_configs:
      - targets: ['nginx:9100']
        labels:
          model: gemma-4-26B-A4B-it
          tier: large

  - job_name: vllm-gemma-e2b
    metrics_path: /metrics/gemma-e2b
    static_configs:
      - targets: ['nginx:9100']
        labels:
          model: gemma-4-E2B-it
          tier: small

  - job_name: vllm-embed-e5
    metrics_path: /metrics/embed-e5
    static_configs:
      - targets: ['nginx:9100']
        labels:
          model: multilingual-e5-large
          tier: embedding

  - job_name: vllm-embed-jina
    metrics_path: /metrics/embed-jina
    static_configs:
      - targets: ['nginx:9100']
        labels:
          model: jina-v5-small
          tier: embedding

  # ── Host metrics ────────────────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # ── GPU metrics ─────────────────────────────────────────────────
  - job_name: dcgm
    static_configs:
      - targets: ['dcgm-exporter:9400']

  # ── Prometheus self-monitoring ──────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── Orchestrator (if/when you instrument it) ────────────────────
  - job_name: orchestrator
    scrape_interval: 5s
    static_configs:
      - targets: ['orchestrator-host:8000']  # adjust to your orchestrator
        labels:
          service: orchestrator